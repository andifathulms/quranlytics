name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: quranlytics
          POSTGRES_USER: quran
          POSTGRES_PASSWORD: quran_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quran -d quranlytics"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      SECRET_KEY: ci-secret-key-not-for-production-use-only
      DEBUG: "True"
      DATABASE_URL: postgres://quran:quran_dev@localhost:5432/quranlytics
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/dev.txt
      - run: pip install -r requirements/dev.txt
      - name: Check migrations are complete
        run: python manage.py makemigrations --check --dry-run
      - name: Run migrations
        run: python manage.py migrate
      - name: Run tests
        run: python -m pytest -p no:cacheprovider

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - name: Type check
        run: npm run typecheck
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000/api/v1
