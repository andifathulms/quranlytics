name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      db:
        # pgvector image — the semantic migration creates the vector extension.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: quranlytics
          POSTGRES_USER: quran
          POSTGRES_PASSWORD: quran_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quran -d quranlytics"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      SECRET_KEY: ci-secret-key-not-for-production-use-only
      DEBUG: "True"
      DATABASE_URL: postgres://quran:quran_dev@localhost:5432/quranlytics
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/base.txt
      # Skip the heavy ML deps (torch): tests patch the embedder and load it
      # lazily, so the suite + migrations run without them.
      - run: pip install -r requirements/base.txt pytest==8.2.1 pytest-django==4.8.0
      - name: Check migrations are complete
        run: python manage.py makemigrations --check --dry-run
      - name: Run migrations
        run: python manage.py migrate
      - name: Run tests
        run: python -m pytest -p no:cacheprovider
      - name: Seed demo data + E2E smoke
        run: |
          pip install requests==2.32.3
          python manage.py migrate --noinput
          python manage.py seed_demo
          python manage.py runserver 127.0.0.1:8000 --noreload &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/api/v1/health/ && break || sleep 1
          done
          SMOKE_BASE=http://127.0.0.1:8000/api/v1 python scripts/smoke.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - name: Type check
        run: npm run typecheck
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000/api/v1
