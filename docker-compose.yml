services:
  db:
    # pgvector image = Postgres 16 + the vector extension (Phase 4 semantic
    # search). Data dir is compatible with the prior postgres:16 volume.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: quranlytics
      POSTGRES_USER: quran
      POSTGRES_PASSWORD: quran_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Host ports remapped off the defaults to avoid colliding with other
      # local stacks. Containers still talk to each other on standard ports.
      - "5440:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quran -d quranlytics"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8010:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery:
    build: ./backend
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file: .env
    depends_on:
      - redis
      - db

  celery-beat:
    build: ./backend
    command: celery -A config beat -l info
    volumes:
      - ./backend:/app
    env_file: .env
    depends_on:
      - redis
      - db

  frontend:
    build: ./frontend
    command: npm run dev
    ports:
      - "3010:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file: .env
    environment:
      # Server-side rendering runs inside this container and reaches the backend
      # over the compose network; the browser uses the host-mapped port.
      API_BASE_INTERNAL: http://backend:8000/api/v1
      NEXT_PUBLIC_API_BASE: http://localhost:8010/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
