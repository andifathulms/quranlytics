[pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
python_files = tests.py test_*.py *_tests.py
# --ds takes precedence over the DJANGO_SETTINGS_MODULE env var that the
# container sets (development), so tests always use the isolated test settings.
addopts = -ra -q --reuse-db --ds=config.settings.test
testpaths = apps
